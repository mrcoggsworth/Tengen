name: edr_credential_dumping
description: >
  Investigate CrowdStrike detections of credential dumping:
  LSASS access, Mimikatz usage, SAM database reads, NTDS.dit extraction.
steps:
  - id: classify_dumping_technique
    description: Identify the specific credential dumping method.
    techniques:
      T1003.001: LSASS Memory
      T1003.002: SAM Database
      T1003.003: NTDS (Domain Controller)
      T1003.004: LSA Secrets
      T1003.006: DCSync
      T1558.003: Kerberoasting
    actions:
      - Extract: process name (lsass.exe access, procdump, mimikatz)
      - Extract: command line arguments
      - Extract: target process or file (SAM, NTDS.dit, lsass.dmp)
      - Map: to MITRE technique

  - id: assess_scope_of_compromise
    description: >
      Determine which credential classes may be compromised.
    actions:
      - If LSASS: assume all cached domain credentials on host are compromised
      - If NTDS.dit: assume all domain accounts are compromised (DCSync = full domain)
      - If SAM: local account hashes compromised
      - Check: is device a Domain Controller (highest severity)
      - Check: is device a PAW or jump server

  - id: identify_affected_accounts
    description: >
      List accounts whose credentials are at risk.
    actions:
      - If host is DC: enumerate all domain accounts via AD query
      - Otherwise: extract logged-on users from CrowdStrike device details
      - Check: service accounts with high privilege (admin, service_desk, backup)

  - id: correlate_post_dump_activity
    description: >
      Look for signs the dumped credentials have already been used.
    actions:
      - Query: CloudTrail for API calls with credentials from compromised host, last 2h
      - Query: Azure sign-in logs for affected accounts, last 2h
      - Query: CrowdStrike for lateral movement from same host

  - id: containment
    description: Emergency credential rotation and account lockdown.
    actions:
      - If DC compromise: initiate domain-wide password reset procedure
      - Disable: all active keys for affected IAM users (disable_iam_user)
      - Revoke: STS sessions (revoke_sts_sessions)
      - Revoke: Azure refresh tokens (revoke_azure_refresh_tokens)
      - Reset: KRBTGT password twice (Golden Ticket invalidation, if DC)
      - Isolate: affected host via CrowdStrike network containment

  - id: produce_finding
    description: Produce the Finding JSON.
    output_fields:
      - finding_id
      - source: crowdstrike
      - severity: CRITICAL
      - title: "Credential Dumping: <technique> on <hostname>"
      - description
      - enrichment: {hostname, technique, process, cmdline, is_dc, affected_accounts}
      - remediation_steps
