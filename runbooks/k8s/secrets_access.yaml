name: k8s_secrets_access
description: >
  Investigate anomalous Kubernetes secret access: bulk listing, access from
  unexpected service accounts, or secret reads outside expected workflows.
steps:
  - id: identify_accessor
    description: Extract the identity and context of the secrets accessor.
    actions:
      - Extract: user/service-account username
      - Extract: namespace, verb (get/list/watch), secret name or wildcard
      - Extract: source IP address
      - Extract: user-agent (kubectl version, CI tool, custom client)
      - Check: is_service_account = "system:serviceaccount" in username

  - id: baseline_access_pattern
    description: >
      Compare this access to the expected baseline for this identity.
      Unexpected access patterns include:
      - SA accessing secrets in a different namespace
      - Bulk list (verb=list) instead of targeted get
      - Access from an unusual source IP
      - Access to secrets not mounted by this SA's pods
    actions:
      - Query: K8s audit log for same user, verb=list on secrets, last 7d
      - Compare: access frequency — sudden spike is suspicious
      - Check: RBAC role bound to this SA (should it have secrets access?)
      - Check: is source IP in cluster CIDR or external

  - id: classify_secret_sensitivity
    description: Determine what type of secrets were accessed.
    secret_types:
      kubernetes.io/service-account-token: cluster access credentials
      kubernetes.io/dockerconfigjson: image registry credentials
      Opaque: could be API keys, passwords, certificates
      kubernetes.io/tls: TLS private keys
    actions:
      - Extract: secret type from audit log or secret metadata
      - Check: secret name for keywords (token, key, password, cert, credential)

  - id: correlate_with_exfiltration
    description: >
      Check whether the accessed secrets have been used elsewhere.
    actions:
      - If service-account-token: query CloudTrail/Azure for API calls using that token
      - Check: subsequent network connections from the accessing pod
      - Query: CrowdStrike or network logs for data exfiltration patterns

  - id: containment
    description: Revoke the compromised credentials and restrict further access.
    actions:
      - If token compromised: delete_k8s_service_account_token(namespace, secret_name)
      - If pod is source: delete_k8s_pod(namespace, pod_name)
      - If SA role is over-permissive: update RBAC RoleBinding (manual step)
      - create_network_policy_deny(namespace, {app: <pod_label>})

  - id: produce_finding
    description: Produce the Finding JSON.
    output_fields:
      - finding_id
      - source: k8s
      - severity
      - title: "Anomalous Secrets Access: <verb> by <user> in <namespace>"
      - description
      - enrichment: {user, namespace, secret_name, secret_type, src_ip, verb}
      - remediation_steps
