<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Tengen Security Dashboard</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: #0d1117; color: #e6edf3; }
  header { background: #161b22; border-bottom: 1px solid #30363d; padding: 16px 24px; display: flex; align-items: center; gap: 12px; }
  header h1 { font-size: 1.2rem; font-weight: 600; color: #58a6ff; }
  header .badge { font-size: 0.7rem; background: #1f6feb; padding: 2px 8px; border-radius: 12px; }
  .main { padding: 24px; max-width: 1400px; margin: 0 auto; }
  .stat-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 16px; margin-bottom: 24px; }
  .stat-card { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 16px; }
  .stat-card .label { font-size: 0.75rem; color: #8b949e; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 6px; }
  .stat-card .value { font-size: 2rem; font-weight: 700; color: #58a6ff; }
  .stat-card.warn .value { color: #f78166; }
  .stat-card.ok .value { color: #3fb950; }
  .section { background: #161b22; border: 1px solid #30363d; border-radius: 8px; margin-bottom: 20px; overflow: hidden; }
  .section-header { padding: 12px 16px; background: #1c2128; border-bottom: 1px solid #30363d; font-weight: 600; font-size: 0.9rem; color: #c9d1d9; display: flex; justify-content: space-between; align-items: center; }
  table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
  th { padding: 8px 16px; text-align: left; color: #8b949e; font-weight: 500; border-bottom: 1px solid #21262d; }
  td { padding: 8px 16px; border-bottom: 1px solid #21262d; color: #c9d1d9; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: #1c2128; }
  .badge-ok { background: #1a4a1a; color: #3fb950; padding: 2px 8px; border-radius: 10px; font-size: 0.75rem; }
  .badge-warn { background: #4a1a1a; color: #f78166; padding: 2px 8px; border-radius: 10px; font-size: 0.75rem; }
  .badge-info { background: #1a3a4a; color: #58a6ff; padding: 2px 8px; border-radius: 10px; font-size: 0.75rem; }
  .refresh-note { font-size: 0.75rem; color: #8b949e; }
  .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
  @media (max-width: 800px) { .two-col { grid-template-columns: 1fr; } }
  .empty { padding: 24px; text-align: center; color: #8b949e; font-size: 0.85rem; }
</style>
</head>
<body>
<header>
  <h1>Tengen Security Dashboard</h1>
  <span class="badge">LIVE</span>
  <span class="refresh-note" id="last-updated">Loading…</span>
</header>
<div class="main">
  <div class="stat-grid" id="stat-grid"></div>
  <div class="two-col">
    <div class="section">
      <div class="section-header">Queue Depths <span class="refresh-note">live</span></div>
      <table id="queue-table">
        <thead><tr><th>Queue</th><th>Messages</th><th>Ready</th><th>Consumers</th></tr></thead>
        <tbody id="queue-tbody"></tbody>
      </table>
    </div>
    <div class="section">
      <div class="section-header">Pipeline Counters</div>
      <table id="metrics-table">
        <thead><tr><th>Metric</th><th>Key</th><th>Count</th></tr></thead>
        <tbody id="metrics-tbody"></tbody>
      </table>
    </div>
  </div>
  <div class="two-col">
    <div class="section">
      <div class="section-header">Registered Routes</div>
      <table id="routes-table">
        <thead><tr><th>Name</th><th>Queue</th><th>Description</th></tr></thead>
        <tbody id="routes-tbody"></tbody>
      </table>
    </div>
    <div class="section">
      <div class="section-header">Runbook Pods</div>
      <table id="runbooks-table">
        <thead><tr><th>Runbook</th><th>Source Queue</th></tr></thead>
        <tbody id="runbooks-tbody"></tbody>
      </table>
    </div>
  </div>
</div>
<script>
async function fetchJSON(url) {
  try { const r = await fetch(url); return await r.json(); } catch { return null; }
}

function setStatCards(overview) {
  if (!overview) return;
  const grid = document.getElementById('stat-grid');
  const cards = [
    { label: 'Alerts Ingested', value: overview.total_ingested, cls: '' },
    { label: 'Runbooks Processed', value: overview.total_processed, cls: 'ok' },
    { label: 'Runbook Errors', value: overview.total_errors, cls: overview.total_errors > 0 ? 'warn' : 'ok' },
    { label: 'DLQ Count', value: overview.dlq_count, cls: overview.dlq_count > 0 ? 'warn' : '' },
    { label: 'Containment Actions', value: overview.containment_actions, cls: '' },
    { label: 'Active Queues', value: overview.queue_count, cls: '' },
  ];
  grid.innerHTML = cards.map(c => `
    <div class="stat-card ${c.cls}">
      <div class="label">${c.label}</div>
      <div class="value">${c.value ?? '—'}</div>
    </div>`).join('');
}

function setQueueTable(queues) {
  const tbody = document.getElementById('queue-tbody');
  if (!queues || !queues.length) { tbody.innerHTML = '<tr><td colspan="4" class="empty">No queues found</td></tr>'; return; }
  tbody.innerHTML = queues.map(q => `
    <tr>
      <td><code>${q.name}</code></td>
      <td>${q.messages}</td>
      <td>${q.messages_ready}</td>
      <td>${q.consumers}</td>
    </tr>`).join('');
}

function setMetricsTable(metrics) {
  const tbody = document.getElementById('metrics-tbody');
  if (!metrics) return;
  const rows = [];
  for (const [bucket, counters] of Object.entries(metrics)) {
    for (const [key, val] of Object.entries(counters)) {
      rows.push(`<tr><td><span class="badge-info">${bucket}</span></td><td>${key}</td><td>${val}</td></tr>`);
    }
  }
  tbody.innerHTML = rows.length ? rows.join('') : '<tr><td colspan="3" class="empty">No metrics yet</td></tr>';
}

function setRoutesTable(routes) {
  const tbody = document.getElementById('routes-tbody');
  if (!routes || !routes.length) { tbody.innerHTML = '<tr><td colspan="3" class="empty">No routes registered</td></tr>'; return; }
  tbody.innerHTML = routes.map(r => `
    <tr>
      <td><code>${r.name}</code></td>
      <td><code>${r.queue}</code></td>
      <td>${r.description || ''}</td>
    </tr>`).join('');
}

function setRunbooksTable(runbooks) {
  const tbody = document.getElementById('runbooks-tbody');
  if (!runbooks || !runbooks.length) { tbody.innerHTML = '<tr><td colspan="2" class="empty">No runbooks discovered</td></tr>'; return; }
  tbody.innerHTML = runbooks.map(r => `
    <tr>
      <td><span class="badge-ok">${r.name}</span></td>
      <td><code>${r.source_queue}</code></td>
    </tr>`).join('');
}

async function refresh() {
  const [overview, queues, metrics, routes, runbooks] = await Promise.all([
    fetchJSON('/api/overview'),
    fetchJSON('/api/queues'),
    fetchJSON('/api/metrics'),
    fetchJSON('/api/routes'),
    fetchJSON('/api/runbooks'),
  ]);
  setStatCards(overview);
  setQueueTable(queues);
  setMetricsTable(metrics);
  setRoutesTable(routes);
  setRunbooksTable(runbooks);
  document.getElementById('last-updated').textContent = 'Updated ' + new Date().toLocaleTimeString();
}

refresh();
setInterval(refresh, 10000);
</script>
</body>
</html>
